<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Team – EHL</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .season-stats-table { font-size: 0.85rem; }
    .season-stats-table thead th { font-size: 0.72rem; }
    .sortable-th { cursor: pointer; user-select: none; }
    .sortable-th:hover { color: #58a6ff; }
    .sortable-th.sort-asc::after  { content: ' ▲'; color: #58a6ff; }
    .sortable-th.sort-desc::after { content: ' ▼'; color: #58a6ff; }
    .no-stats { color: #8b949e; padding: 1rem 0; }
    /* Records tabs */
    .rec-tab { transition: background 0.15s, color 0.15s; }
    .rec-tab-active { background: #388bfd !important; color: #fff !important; }
    /* Responsive two-column layout */
    @media (max-width: 780px) {
      .team-page-grid { grid-template-columns: 1fr !important; }
    }
    /* Prevent roster player stat row from forcing width */
    .team-page-grid > div { min-width: 0; overflow: hidden; }
  </style>
</head>
<body>
  <nav>
    <a href="index.html" class="brand">
      <img src="/api/site-logo" alt="EHL" class="brand-logo" />

    </a>
    <a href="index.html">Home</a>
    <a href="schedule.html">Schedule</a>
    <div class="nav-dropdown">
      <a href="standings.html" class="active">Standings ▾</a>
      <div class="nav-dropdown-menu">
        <a href="recent-scores.html">🏒 Recent Scores</a>
      </div>
    </div>
    <a href="stats.html">Stats</a>
    <a href="players.html">Players</a>
    <a href="admin.html" id="nav-admin-link" style="display:none">Admin</a>
    <a href="register.html" class="nav-portal">Player Portal</a>
  </nav>

  <div class="container">
    <div id="team-root"><p class="loading">Loading…</p></div>
  </div>

  <script src="season-selector.js"></script>
  <script src="stats-config.js"></script>
  <script src="team.js"></script>
  <script src="notifications.js"></script>
  <script src="nav.js"></script>
</body>
</html>
