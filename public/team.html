<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Team – EHL</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .season-stats-table { font-size: 0.85rem; }
    .season-stats-table thead th { font-size: 0.72rem; }
    .sortable-th { cursor: pointer; user-select: none; }
    .sortable-th:hover { color: #58a6ff; }
    .sortable-th.sort-asc::after  { content: ' ▲'; color: #58a6ff; }
    .sortable-th.sort-desc::after { content: ' ▼'; color: #58a6ff; }
    .recent-game {
      display: flex; align-items: center; gap: 1rem;
      padding: 0.6rem 0; border-bottom: 1px solid #21262d;
      flex-wrap: wrap;
    }
    .recent-game:last-child { border-bottom: none; }
    .rg-score { font-weight: 700; font-size: 1rem; color: #e6edf3; }
    .rg-opponent { color: #c9d1d9; }
    .rg-date { color: #8b949e; font-size: 0.85rem; margin-left: auto; }
    .no-stats { color: #8b949e; padding: 1rem 0; }
  </style>
</head>

      </div>
    </div>
    <a href="stats.html">Stats</a>
    <a href="players.html">Players</a>
    <a href="admin.html">Admin</a>
    <a href="register.html" class="nav-portal">Player Portal</a>
  </nav>

  <div class="container">
    <div id="team-root"><p class="loading">Loading…</p></div>
  </div>

  <script src="season-selector.js"></script>
  <script src="stats-config.js"></script>
  <script src="team.js"></script>
  <script src="notifications.js"></script>
  <script src="nav.js"></script>
</body>
</html>
