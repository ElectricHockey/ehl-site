<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <!-- Shield gradient: dark navy -->
    <linearGradient id="shieldGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0a2e"/>
      <stop offset="100%" stop-color="#090920"/>
    </linearGradient>
    <!-- EHL text gradient: cyan → purple -->
    <linearGradient id="ehlGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="50%" stop-color="#7b3fff"/>
      <stop offset="100%" stop-color="#cc00cc"/>
    </linearGradient>
    <!-- Stick gradient: blue → purple -->
    <linearGradient id="stickGrad1" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#1a3aff"/>
      <stop offset="100%" stop-color="#9b30d9"/>
    </linearGradient>
    <linearGradient id="stickGrad2" x1="1" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#2244ff"/>
      <stop offset="100%" stop-color="#cc44ff"/>
    </linearGradient>
    <!-- Shield border glow -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="textGlow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Hockey stick LEFT (shaft + blade) -->
  <g stroke="url(#stickGrad1)" stroke-linecap="round" fill="none">
    <!-- shaft -->
    <line x1="55" y1="15" x2="115" y2="165" stroke-width="9"/>
    <!-- blade -->
    <path d="M115 165 Q108 178 90 175" stroke-width="8"/>
  </g>

  <!-- Hockey stick RIGHT (mirrored) -->
  <g stroke="url(#stickGrad2)" stroke-linecap="round" fill="none">
    <!-- shaft -->
    <line x1="145" y1="15" x2="85" y2="165" stroke-width="9"/>
    <!-- blade -->
    <path d="M85 165 Q92 178 110 175" stroke-width="8"/>
  </g>

  <!-- Shield outer glow border (magenta) -->
  <path filter="url(#glow)"
    d="M100 18 L148 38 L158 100 Q158 148 100 182 Q42 148 42 100 L52 38 Z"
    fill="none" stroke="#cc00cc" stroke-width="4.5" opacity="0.85"/>

  <!-- Shield inner border (brighter purple) -->
  <path
    d="M100 18 L148 38 L158 100 Q158 148 100 182 Q42 148 42 100 L52 38 Z"
    fill="none" stroke="#9933ff" stroke-width="2"/>

  <!-- Shield fill -->
  <path
    d="M100 22 L145 41 L154 100 Q154 145 100 178 Q46 145 46 100 L55 41 Z"
    fill="url(#shieldGrad)"/>

  <!-- Inner shield rectangle accent (bright magenta border) -->
  <rect x="62" y="48" width="76" height="84" rx="4"
    fill="none" stroke="#dd00cc" stroke-width="2" opacity="0.8"/>
  <rect x="65" y="51" width="70" height="78" rx="3"
    fill="none" stroke="#7700cc" stroke-width="1" opacity="0.6"/>

  <!-- Side arrow accents (left) -->
  <polygon points="44,72 53,80 44,88" fill="#9933ff" opacity="0.9"/>
  <polygon points="40,84 49,92 40,100" fill="#cc00cc" opacity="0.7"/>

  <!-- Side arrow accents (right) -->
  <polygon points="156,72 147,80 156,88" fill="#9933ff" opacity="0.9"/>
  <polygon points="160,84 151,92 160,100" fill="#cc00cc" opacity="0.7"/>

  <!-- EHL text -->
  <text filter="url(#textGlow)"
    x="100" y="108"
    text-anchor="middle"
    font-family="'Arial Black','Impact',sans-serif"
    font-size="52" font-weight="900"
    fill="url(#ehlGrad)"
    letter-spacing="2">EHL</text>

  <!-- EST. 2024 in pixel/retro style -->
  <text x="100" y="140"
    text-anchor="middle"
    font-family="'Courier New',monospace"
    font-size="10" font-weight="700"
    fill="#00ccff" letter-spacing="2" opacity="0.9">EST. 2024</text>
</svg>
