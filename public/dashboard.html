<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Player Dashboard – EHL</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .dash-card { background:#161b22;border:1px solid #30363d;border-radius:10px;padding:1.25rem 1.5rem;margin-bottom:1.25rem; }
    .dash-card h2 { margin:0 0 0.9rem;font-size:1.05rem;color:#e6edf3; }
    .player-badge { display:inline-flex;align-items:center;gap:0.5rem;background:#1c2a3a;border:1px solid #1f6feb;border-radius:6px;padding:0.35rem 0.8rem;font-size:0.9rem;color:#58a6ff; }
    .roster-tag { font-size:0.75rem;padding:0.15rem 0.5rem;border-radius:10px;background:#1f4b2f;color:#3fb950;font-weight:600; }
    .roster-tag.free { background:#3d2e00;color:#e3b341; }
    .role-badge { font-size:0.75rem;padding:0.15rem 0.5rem;border-radius:10px;background:#1c2a3a;color:#58a6ff;font-weight:600; }
    .user-list { max-height:200px;overflow-y:auto;border:1px solid #30363d;border-radius:6px;margin-top:0.4rem; }
    .user-item { display:flex;align-items:center;justify-content:space-between;padding:0.45rem 0.75rem;border-bottom:1px solid #21262d;font-size:0.88rem; }
    .user-item:last-child { border-bottom:none; }
    .roster-row { display:flex;align-items:center;gap:0.5rem;padding:0.35rem 0;border-bottom:1px solid #21262d;font-size:0.88rem; }
    .roster-row:last-child { border-bottom:none; }
    .search-input { width:100%;padding:0.4rem 0.7rem;background:#0d1117;border:1px solid #30363d;color:#e6edf3;border-radius:6px;font-size:0.88rem;box-sizing:border-box;margin-bottom:0.5rem; }
    .tab-bar { display:flex;gap:0.4rem;margin-bottom:1rem;flex-wrap:wrap; }
    .tab-pill { padding:0.35rem 0.9rem;border-radius:20px;border:1px solid #30363d;background:#21262d;color:#8b949e;cursor:pointer;font-size:0.85rem;transition:all 0.15s; }
    .tab-pill.active { background:#1c2a3a;border-color:#58a6ff;color:#58a6ff; }
    .dash-section { display:none; }
    .dash-section.active { display:block; }
  </style>
</head>
<body>
  <nav>
    <a href="index.html" class="brand">
      <img src="/api/site-logo" alt="EHL" class="brand-logo" />

    </a>
    <a href="index.html">Home</a>
    <a href="schedule.html">Schedule</a>
    <div class="nav-dropdown">
      <a href="standings.html">Standings ▾</a>
      <div class="nav-dropdown-menu">
        <a href="recent-scores.html">🏒 Recent Scores</a>
      </div>
    </div>
    <a href="stats.html">Stats</a>
    <a href="records.html">Records</a>
    <a href="players.html">Players</a>
    <a href="admin.html" id="nav-admin-link" style="display:none">Admin</a>
    <a href="register.html" class="active nav-portal">Player Portal</a>
  </nav>

  <div class="container">
    <div id="dash-root"><p class="loading">Loading…</p></div>
  </div>

  <script src="dashboard.js"></script>
  <script src="notifications.js"></script>
  <script src="nav.js"></script>
  <script defer src="https://cdn.vercel-insights.com/v1/script.js"></script>
</body>
</html>
