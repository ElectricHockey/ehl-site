<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Recent Scores – EHL</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .score-card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 8px;
      padding: 0.9rem 1.2rem;
      margin-bottom: 0.75rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      flex-wrap: wrap;
    }
    .score-teams {
      flex: 1;
      min-width: 200px;
      display: flex;
      align-items: center;
      gap: 0.75rem;
      flex-wrap: wrap;
    }
    .score-team-name { font-weight: 600; font-size: 1rem; color: #e6edf3; }
    .score-num {
      font-size: 1.6rem;
      font-weight: 800;
      color: #58a6ff;
      min-width: 1.5rem;
      text-align: center;
    }
    .score-vs { color: #8b949e; font-size: 0.85rem; }
    .score-date { color: #8b949e; font-size: 0.82rem; margin-left: auto; white-space: nowrap; }
    .score-winner { color: #3fb950; }
    .team-logo-sm {
      width: 28px; height: 28px;
      object-fit: contain; border-radius: 4px;
      vertical-align: middle;
    }
    .score-card-link {
      display: flex; text-decoration: none; color: inherit;
      cursor: pointer; transition: border-color 0.15s, background 0.15s;
    }
    .score-card-link:hover { border-color: #388bfd; background: #1c2333; }
    .score-view-stats {
      font-size: 0.78rem; color: #388bfd; margin-left: 0.75rem;
      align-self: center; white-space: nowrap; opacity: 0;
      transition: opacity 0.15s;
    }
    .score-card-link:hover .score-view-stats { opacity: 1; }
  </style>
</head>
<body>
  <nav>
    <a href="index.html" class="brand">
      <img src="logo.svg" alt="EHL" class="brand-logo" />
      <span class="brand-text">EHL</span>
    </a>
    <a href="index.html">Home</a>
    <a href="schedule.html">Schedule</a>
    <div class="nav-dropdown">
      <a href="standings.html">Standings ▾</a>
      <div class="nav-dropdown-menu">
        <a href="recent-scores.html" class="active">🏒 Recent Scores</a>
      </div>
    </div>
    <a href="stats.html">Stats</a>
    <a href="players.html">Players</a>
    <a href="admin.html">Admin</a>
    <a href="register.html" class="nav-portal">Player Portal</a>
  </nav>

  <div class="container">
    <h1>Recent Scores</h1>
    <p style="color:#8b949e;margin-bottom:1rem;">Completed games, newest first.</p>
    <div style="margin-bottom:1.25rem;" id="season-selector-container"></div>
    <div id="scores-root"><p class="loading">Loading scores…</p></div>
  </div>

  <script src="season-selector.js"></script>
  <script src="recent-scores.js"></script>
  <script src="notifications.js"></script>
  <script src="nav.js"></script>
</body>
</html>
