<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Player – EHL</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .player-header {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 10px;
      padding: 1.5rem 2rem;
      margin-bottom: 1.5rem;
      display: flex;
      align-items: center;
      gap: 1.25rem;
      flex-wrap: wrap;
    }
    .player-avatar {
      width: 64px; height: 64px;
      background: #21262d; border: 2px solid #30363d;
      border-radius: 50%; display: flex; align-items: center;
      justify-content: center; font-size: 1.8rem; flex-shrink: 0;
    }
    .player-info { flex: 1; min-width: 0; }
    .player-name { font-size: 1.6rem; font-weight: 800; color: #e6edf3; margin: 0 0 0.3rem; }
    .player-meta { display: flex; flex-wrap: wrap; gap: 0.5rem; align-items: center; }
    .player-badge-pos {
      display: inline-block; font-size: 0.78rem; font-weight: 600;
      background: #1f2d3d; color: #58a6ff; border: 1px solid #388bfd55;
      border-radius: 10px; padding: 0.15rem 0.55rem;
    }
    .player-badge-team {
      display: inline-flex; align-items: center; gap: 0.35rem;
      font-size: 0.82rem; font-weight: 600; color: #3fb950;
      background: #122317; border: 1px solid #238636;
      border-radius: 10px; padding: 0.15rem 0.6rem;
      text-decoration: none;
    }
    .player-badge-team:hover { background: #1a3622; }
    .player-badge-team img { width: 16px; height: 16px; object-fit: contain; border-radius: 2px; }
    .player-badge-fa {
      font-size: 0.78rem; color: #8b949e; background: #21262d;
      border: 1px solid #30363d; border-radius: 10px; padding: 0.15rem 0.55rem;
    }
    .player-badge-platform {
      font-size: 0.75rem; color: #8b949e;
      background: #161b22; border: 1px solid #30363d;
      border-radius: 10px; padding: 0.12rem 0.5rem;
    }
    .section-heading {
      font-size: 1rem; font-weight: 700; color: #e6edf3;
      margin: 1.5rem 0 0.6rem; padding-bottom: 0.4rem;
      border-bottom: 2px solid #30363d;
    }
    /* Last 5 games table */
    .last-games-table { width: 100%; border-collapse: collapse; }
    .last-games-table th { font-size: 0.75rem; color: #8b949e; font-weight: 600; padding: 0.3rem 0.5rem; text-align: left; border-bottom: 1px solid #30363d; }
    .last-games-table td { font-size: 0.85rem; padding: 0.4rem 0.5rem; border-bottom: 1px solid #21262d; color: #e6edf3; }
    .last-games-table tr:last-child td { border-bottom: none; }
    .result-w { color: #3fb950; font-weight: 700; }
    .result-l { color: #f85149; font-weight: 700; }
    /* Season table */
    .season-block { margin-bottom: 1.5rem; }
    .season-label {
      font-size: 0.82rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.06em; color: #8b949e; margin-bottom: 0.35rem;
      display: flex; align-items: center; gap: 0.4rem;
    }
    .season-total-row td { background: rgba(56,139,253,0.07); font-weight: 600; color: #58a6ff; }
    .career-total-row td { background: rgba(63,185,80,0.1); font-weight: 700; color: #3fb950; font-size: 0.9rem; }
    .team-logo-xs { width: 16px; height: 16px; object-fit: contain; border-radius: 2px; vertical-align: middle; margin-right: 0.25rem; }
    .back-link { color: #58a6ff; font-size: 0.88rem; text-decoration: none; display: inline-block; margin-bottom: 1rem; }
    .back-link:hover { text-decoration: underline; }
    .player-link { color: #58a6ff; text-decoration: none; }
    .player-link:hover { text-decoration: underline; }
    /* League-type tabs */
    .lt-tabs {
      display: flex;
      gap: 0;
      border-bottom: 2px solid #30363d;
      margin-bottom: 0;
    }
    .lt-tab {
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      color: #8b949e;
      cursor: pointer;
      font-size: 0.95rem;
      font-weight: 700;
      padding: 0.5rem 1.25rem;
      margin-bottom: -2px;
      transition: color 0.15s;
    }
    .lt-tab:hover { color: #e6edf3; }
    .lt-tab.lt-tab-active { color: #58a6ff; border-bottom-color: #58a6ff; }
  </style>
</head>
<body>
  <nav>
    <a href="index.html" class="brand">
      <img src="logo.svg" alt="EHL" class="brand-logo" />
      <span class="brand-text">EHL</span>
    </a>
    <a href="index.html">Home</a>
    <a href="schedule.html">Schedule</a>
    <div class="nav-dropdown">
      <a href="standings.html">Standings ▾</a>
      <div class="nav-dropdown-menu">
        <a href="recent-scores.html">🏒 Recent Scores</a>
        <a href="playoffs.html">🏆 Playoffs</a>
      </div>
    </div>
    <a href="stats.html">Stats</a>
    <a href="admin.html">Admin</a>
    <a href="register.html" class="nav-portal">Player Portal</a>
  </nav>

  <div class="container">
    <a href="javascript:history.back()" class="back-link">← Back</a>
    <div id="player-root"><p class="loading">Loading player…</p></div>
  </div>

  <script src="player.js"></script>
  <script src="notifications.js"></script>
  <script src="nav.js"></script>
</body>
</html>
