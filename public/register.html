<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register / Login – EHL</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .auth-card {
      max-width: 420px; margin: 2.5rem auto;
      background: #161b22; border: 1px solid #30363d;
      border-radius: 10px; padding: 2rem 2.5rem;
    }
    .auth-tabs { display: flex; gap: 0; margin-bottom: 1.5rem; border-bottom: 1px solid #30363d; }
    .auth-tab {
      padding: 0.5rem 1.2rem; background: none; border: none;
      color: #8b949e; cursor: pointer; font-size: 0.95rem;
      border-bottom: 2px solid transparent; transition: all 0.15s;
    }
    .auth-tab.active { color: #58a6ff; border-bottom-color: #58a6ff; }
    .auth-section { display: none; }
    .auth-section.active { display: block; }
    .platform-group { display: flex; gap: 0.75rem; margin-top: 0.3rem; }
    .platform-btn {
      flex: 1; padding: 0.5rem; border: 1px solid #30363d; border-radius: 6px;
      background: #21262d; color: #8b949e; cursor: pointer; font-size: 0.88rem;
      transition: all 0.15s; text-align: center;
    }
    .platform-btn.selected { border-color: #58a6ff; color: #58a6ff; background: #1c2a3a; }
    .error-msg { color: #f85149; font-size: 0.85rem; margin-top: 0.5rem; display: none; }
    .success-msg { color: #3fb950; font-size: 0.85rem; margin-top: 0.5rem; display: none; }
    .discord-connect-btn {
      display: flex; align-items: center; justify-content: center; gap: 0.6rem;
      width: 100%; padding: 0.6rem 1rem; border-radius: 6px; border: none; cursor: pointer;
      background: #5865f2; color: #fff; font-size: 0.95rem; font-weight: 600;
      transition: background 0.15s;
    }
    .discord-connect-btn:hover { background: #4752c4; }
    .discord-connect-btn:disabled { background: #3a4499; cursor: default; opacity: 0.75; }
    .discord-linked-badge {
      display: flex; align-items: center; gap: 0.5rem; padding: 0.5rem 0.75rem;
      background: rgba(88,101,242,0.15); border: 1px solid #5865f2; border-radius: 6px;
      color: #a5b4fc; font-size: 0.88rem;
    }
    .discord-linked-badge strong { color: #e0e7ff; }
  </style>
</head>
<body>
  <nav>
    <a href="index.html" class="brand">
      <img src="logo.svg" alt="EHL" class="brand-logo" />
      <span class="brand-text">EHL</span>
    </a>
    <a href="index.html">Home</a>
    <a href="schedule.html">Schedule</a>
    <div class="nav-dropdown">
      <a href="standings.html">Standings ▾</a>
      <div class="nav-dropdown-menu">
        <a href="recent-scores.html">🏒 Recent Scores</a>
        <a href="playoffs.html">🏆 Playoffs</a>
      </div>
    </div>
    <a href="stats.html">Stats</a>
    <a href="players.html">Players</a>
    <a href="admin.html">Admin</a>
    <a href="register.html" class="active nav-portal">Player Portal</a>
  </nav>

  <div class="auth-card">
    <div class="auth-tabs">
      <button class="auth-tab active" onclick="showTab('login')">Sign In</button>
      <button class="auth-tab" onclick="showTab('register')">Register</button>
    </div>

    <!-- LOGIN -->
    <div id="tab-login" class="auth-section active">
      <h2 style="margin-top:0;margin-bottom:1rem;">Welcome Back</h2>
      <form id="login-form">
        <div class="form-group" style="flex-direction:column;margin-bottom:0.75rem;">
          <label for="login-username">Gamertag</label>
          <input type="text" id="login-username" placeholder="Xbox / PSN gamertag" required autocomplete="username" />
        </div>
        <div class="form-group" style="flex-direction:column;margin-bottom:0.75rem;">
          <label for="login-password">Password</label>
          <input type="password" id="login-password" placeholder="Password" required autocomplete="current-password" />
        </div>
        <button type="submit" style="width:100%;margin-top:0.5rem;">Sign In</button>
        <div id="login-error" class="error-msg"></div>
      </form>
    </div>

    <!-- REGISTER -->
    <div id="tab-register" class="auth-section">
      <h2 style="margin-top:0;margin-bottom:1rem;">Create Account</h2>
      <form id="register-form">
        <div class="form-group" style="flex-direction:column;margin-bottom:0.75rem;">
          <label>Platform</label>
          <div class="platform-group">
            <button type="button" class="platform-btn selected" id="btn-xbox" onclick="selectPlatform('xbox')">🎮 Xbox</button>
            <button type="button" class="platform-btn" id="btn-psn" onclick="selectPlatform('psn')">🎮 PSN</button>
          </div>
          <input type="hidden" id="reg-platform" value="xbox" />
        </div>
        <div class="form-group" style="flex-direction:column;margin-bottom:0.75rem;">
          <label for="reg-username">Gamertag *</label>
          <input type="text" id="reg-username" placeholder="Your Xbox / PSN username" required autocomplete="username" />
        </div>
        <div class="form-group" style="flex-direction:column;margin-bottom:0.75rem;">
          <label for="reg-email">Email <span style="color:#8b949e;font-size:0.8rem;">(optional)</span></label>
          <input type="email" id="reg-email" placeholder="email@example.com" autocomplete="email" />
        </div>
        <div class="form-group" style="flex-direction:column;margin-bottom:0.75rem;">
          <label for="reg-position">Position *</label>
          <select id="reg-position" required style="background:#21262d;border:1px solid #30363d;color:#e6edf3;border-radius:6px;padding:0.4rem 0.7rem;font-size:0.9rem;">
            <option value="">— Select position —</option>
            <option value="C">C — Centre</option>
            <option value="LW">LW — Left Wing</option>
            <option value="RW">RW — Right Wing</option>
            <option value="LD">LD — Left Defence</option>
            <option value="RD">RD — Right Defence</option>
            <option value="G">G — Goalie</option>
          </select>
        </div>
        <div class="form-group" style="flex-direction:column;margin-bottom:0.75rem;">
          <label>Discord Account *</label>
          <div id="discord-unlinked">
            <button type="button" class="discord-connect-btn" id="discord-oauth-btn" onclick="startDiscordOAuth()">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057c.002.022.013.043.03.056a19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028 14.09 14.09 0 0 0 1.226-1.994.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03z"/></svg>
              Connect with Discord
            </button>
            <p style="color:#8b949e;font-size:0.78rem;margin-top:0.4rem;">Your Discord account will be linked to your EHL profile.</p>
          </div>
          <div id="discord-linked" style="display:none;">
            <div class="discord-linked-badge">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057c.002.022.013.043.03.056a19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028 14.09 14.09 0 0 0 1.226-1.994.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03z"/></svg>
              ✓ Connected as <strong id="discord-display-name"></strong>
              <button type="button" onclick="resetDiscordLink()" style="margin-left:auto;background:none;border:none;color:#a5b4fc;cursor:pointer;font-size:0.78rem;text-decoration:underline;padding:0;">Change</button>
            </div>
          </div>
          <input type="hidden" id="reg-discord" />
          <input type="hidden" id="reg-discord-id" />
        </div>
        <div class="form-group" style="flex-direction:column;margin-bottom:0.75rem;">
          <label for="reg-password">Password *</label>
          <input type="password" id="reg-password" placeholder="At least 6 characters" required autocomplete="new-password" />
        </div>
        <div class="form-group" style="flex-direction:column;margin-bottom:0.75rem;">
          <label for="reg-confirm">Confirm Password *</label>
          <input type="password" id="reg-confirm" placeholder="Repeat password" required autocomplete="new-password" />
        </div>
        <button type="submit" style="width:100%;margin-top:0.5rem;">Create Account</button>
        <div id="register-error" class="error-msg"></div>
        <div id="register-success" class="success-msg"></div>
      </form>
    </div>
  </div>

  <script src="register.js"></script>
  <script src="notifications.js"></script>
  <script src="nav.js"></script>
</body>
</html>
